appId: com.maurya.app
productName: Maurya
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tsconfig.test.json}'
  - '!{tests,docs,specs,scripts}/**'
  - '!{vitest.config.ts,components.json,start.sh,CLAUDE.md}'
asarUnpack:
  - resources/**
mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  # Firma ad-hoc: sin Developer ID ni notarización en esta fase (H7 = distribución)
  identity: null
  notarize: false
  entitlementsInherit: build/entitlements.mac.plist
  # extendInfo DEBE ser un map (una lista deja el Info.plist sin las claves TCC)
  extendInfo:
    NSMicrophoneUsageDescription: >-
      Maurya necesita acceso al micrófono para grabar y transcribir tu voz
      durante las entrevistas.
    NSAudioCaptureUsageDescription: >-
      Maurya necesita capturar el audio del sistema para grabar y transcribir
      la voz de la persona entrevistada (llamada o reunión en curso).
dmg:
  artifactName: ${productName}-${version}.${ext}
npmRebuild: false
